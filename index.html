@import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo:ital,wght@0,400;0,600;0,800;1,400&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; }
button { touch-action: manipulation; }

.raiz {
  min-height: 100vh;
  background-color: ${f.laranja};
  background-image:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.07), transparent 38%),
    radial-gradient(circle at 85% 80%, rgba(0,0,0,.12), transparent 45%),
    repeating-linear-gradient(45deg, rgba(0,0,0,.025) 0 2px, transparent 2px 6px);
  font-family: 'Archivo', sans-serif;
  color: ${f.navy};
  padding-bottom: 28px;
}

/* ---- cabeçalho ---- */
.cabecalho { text-align: center; padding: 10px 12px 6px; }
.cabecalho-compacto { padding-bottom: 2px; }
.bandeirinhas { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
.bandeira { width: 16px; height: 20px; clip-path: polygon(0 0, 100% 0, 50% 100%); opacity: .92; }
.titulo {
  font-family: 'Alfa Slab One', serif; color: ${f.creme};
  font-size: clamp(28px, 7vw, 52px); margin: 0; letter-spacing: 1px;
  text-shadow: 0 3px 0 ${f.laranjaEscuro}, 0 6px 14px rgba(0,0,0,.28);
}
.titulo-compacto { font-size: clamp(22px, 5.5vw, 38px); }
.faixa-evento {
  display: inline-block; background: ${f.creme}; color: ${f.navy};
  font-family: 'Alfa Slab One', serif; font-size: clamp(16px, 4vw, 24px);
  padding: 4px 22px; border: 3px solid ${f.navy}; border-radius: 6px;
  transform: rotate(-.6deg); margin-top: 6px; box-shadow: 0 4px 0 rgba(0,0,0,.18);
}
.faixa-compacta { font-size: clamp(12px, 3vw, 17px); padding: 3px 16px; }
.faixa-data { display: inline-block; background: ${f.navy}; color: ${f.creme}; font-weight: 800; letter-spacing: .5px; padding: 3px 18px; border-radius: 999px; margin-top: 8px; font-size: 14px; }
.contador-vitrine { display: block; margin: 14px auto 0; font-family: 'Alfa Slab One', serif; color: ${f.creme}; font-size: clamp(20px, 5vw, 32px); letter-spacing: 1px; text-shadow: 0 3px 0 ${f.laranjaEscuro}; }
.contador-vitrine b { color: #fff; }

/* ---- barra principal ---- */
.barra-principal {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
  margin: 12px auto 0; padding: 0 12px; max-width: 1400px;
}
.btn-menu {
  border: 3px solid ${f.creme}; background: ${f.navy}; color: ${f.creme};
  font-family: 'Archivo'; font-weight: 800; font-size: 17px; padding: 9px 16px; border-radius: 12px; cursor: pointer;
  box-shadow: 0 3px 0 rgba(0,0,0,.25);
}
.btn-menu-txt { font-size: 14px; }
.contadores { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; flex: 1; }
.chip { background: ${f.cremeClaro}; border-radius: 999px; padding: 5px 11px; font-size: 12.5px; font-weight: 700; border: 2px solid transparent; }
.chip-livre { border-color: #c9b98f; }
.chip-res { border-color: ${f.dourado}; }
.chip-paga { border-color: ${f.verde}; }
.chip-avulso { border-color: ${f.navyClaro}; }
.chip-receita { background: ${f.navy}; color: ${f.creme}; }
.zoom-grupo { display: flex; gap: 5px; align-items: center; }
.btn-mini { width: 32px; height: 32px; border-radius: 8px; border: 2px solid ${f.creme}; background: transparent; color: ${f.creme}; font-size: 18px; font-weight: 800; cursor: pointer; }
.zoom-label { color: ${f.creme}; font-size: 12px; font-weight: 600; min-width: 38px; text-align: center; }

.btn-sec { border: 2px solid ${f.creme}; background: transparent; color: ${f.creme}; font-family: 'Archivo'; font-weight: 700; font-size: 13px; padding: 7px 12px; border-radius: 10px; cursor: pointer; }
.btn-sec-navy { border-color: ${f.navy}; color: ${f.navy}; }
.btn-prim { border: 0; background: ${f.navy}; color: ${f.creme}; font-family: 'Archivo'; font-weight: 800; font-size: 14px; padding: 10px 18px; border-radius: 10px; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.25); }
.btn-prim:disabled { opacity: .5; cursor: not-allowed; }
.btn-perigo { border: 2px solid ${f.vermelho}; background: transparent; color: ${f.vermelho}; font-family: 'Archivo'; font-weight: 700; font-size: 13px; padding: 9px 14px; border-radius: 10px; cursor: pointer; }

/* ---- menu suspenso (drawer) ---- */
.overlay-menu { align-items: stretch !important; justify-content: flex-start !important; padding: 0 !important; }
.drawer {
  background: ${f.cremeClaro}; width: min(320px, 86vw); height: 100vh; overflow: auto;
  border-right: 5px solid ${f.navy}; padding: 16px 14px; display: flex; flex-direction: column;
  animation: deslizar .18s ease-out;
}
@keyframes deslizar { from { transform: translateX(-30px); opacity: 0; } to { transform: none; opacity: 1; } }
.drawer-topo { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.drawer-titulo { font-family: 'Alfa Slab One', serif; font-size: 15px; color: ${f.navy}; }
.drawer-secao { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: #9a8a60; margin: 14px 4px 4px; }
.drawer-item {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  border: 2px solid transparent; background: #fff; color: ${f.navy};
  font-family: 'Archivo'; font-weight: 700; font-size: 14.5px;
  padding: 12px 13px; border-radius: 12px; cursor: pointer; margin-top: 6px;
  box-shadow: 0 1px 0 rgba(0,0,0,.08);
}
.drawer-item.ativo { border-color: ${f.navy}; background: ${f.creme}; }
.badge-alerta-inline { margin-left: auto; background: ${f.vermelho}; color: #fff; font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; }
.drawer-rodape { margin-top: auto; padding-top: 18px; text-align: center; font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #9a8a60; }

/* ---- busca ---- */
.barra-busca { max-width: 1400px; margin: 8px auto 0; padding: 0 12px; display: flex; gap: 8px; align-items: center; }
.barra-busca input { flex: 1; font-family: 'Archivo'; font-size: 15px; padding: 11px 14px; border: 3px solid ${f.navy}; border-radius: 12px; background: ${f.cremeClaro}; color: ${f.navy}; }
.barra-busca input:focus { outline: 3px solid ${f.creme}; }
.busca-resultado { color: ${f.creme}; font-weight: 800; font-size: 13px; white-space: nowrap; }
.btn-limpar { flex-shrink: 0; }

/* ---- faixas de aviso ---- */
.alerta-vencidas { max-width: 1400px; margin: 8px auto 0; padding: 10px 14px; cursor: pointer; background: ${f.vermelho}; color: #fff; border-radius: 12px; font-size: 13.5px; border: 2px dashed #fff; }
.aviso-edicao, .aviso-selecao {
  max-width: 1400px; margin: 8px auto 0; padding: 10px 14px;
  color: ${f.creme}; border-radius: 12px; font-size: 13.5px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;
}
.aviso-edicao { background: ${f.navy}; }
.aviso-selecao { background: ${f.verde}; border: 2px dashed #fff; }
.botoes-edicao { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-add { border: 2px solid ${f.creme}; background: ${f.cremeClaro}; color: ${f.navy}; font-family: 'Archivo'; font-weight: 700; font-size: 12.5px; padding: 6px 11px; border-radius: 8px; cursor: pointer; }
.btn-add:disabled { opacity: .55; cursor: not-allowed; }
.btn-add-destaque { background: ${f.dourado}; border-color: #fff; }
.btn-add-sair { background: ${f.navy}; color: ${f.creme}; }

/* ---- mapa ---- */
.moldura { max-width: 1400px; margin: 14px auto 0; background: ${f.cremeClaro}; border: 4px solid ${f.navy}; border-radius: 22px; padding: 14px; box-shadow: inset 0 0 0 3px ${f.creme}, 0 10px 30px rgba(0,0,0,.25); position: relative; }
.rotulo-area { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: ${f.navy}; color: ${f.creme}; font-family: 'Alfa Slab One', serif; font-size: 14px; letter-spacing: 1.5px; padding: 5px 22px; border-radius: 8px; white-space: nowrap; }
.scroll-mapa { overflow: auto; border-radius: 12px; }
.canvas { position: relative; touch-action: none; }

.zona { position: absolute; border: 2.5px dashed; border-radius: 14px; display: flex; justify-content: center; padding-top: 8px; }
.zona-titulo { font-family: 'Alfa Slab One', serif; font-size: 16px; letter-spacing: 1.5px; }

.area { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border-radius: 12px; }
.area-navy { background: ${f.navy}; color: ${f.creme}; border: 3px solid ${f.dourado}; font-family: 'Alfa Slab One', serif; letter-spacing: 2px; text-align: center; box-shadow: 0 5px 0 rgba(0,0,0,.25); }
.area-navy .area-label { font-size: clamp(12px, 1.3vw, 18px); padding: 0 6px; }
.area-zona { background: #FFF8E6; border: 2.5px dashed ${f.navy}; color: ${f.navy}; font-family: 'Alfa Slab One', serif; text-align: center; }
.area-zona .area-label { font-size: clamp(12px, 1.2vw, 16px); padding: 0 8px; letter-spacing: 1px; }
.area-texto { color: ${f.laranjaEscuro}; font-weight: 800; letter-spacing: 4px; font-size: 14px; }
.estrela { color: ${f.dourado}; font-size: 13px; }
.area-zona .estrela, .area-texto .estrela { display: none; }

.mesa {
  position: absolute; width: 46px; height: 46px; border-radius: 50%;
  border: 3px solid; background: #fff;
  font-family: 'Archivo'; font-weight: 800; font-size: 14.5px; color: ${f.navy};
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 0 rgba(0,0,0,.18);
  transition: transform .12s ease, opacity .15s ease;
}
.mesa:hover { transform: scale(1.12); z-index: 5; }
.mesa:focus-visible { outline: 3px solid ${f.navy}; outline-offset: 2px; }
.mesa-livre { background: #FFFDF6; }
.mesa-reservada { background: ${f.dourado}; border-color: #B97A1E; color: #5C3A06; }
.mesa-paga { background: ${f.verde}; border-color: #35591F; color: #fff; }
.mesa-estatica { cursor: default; }
.mesa.vencida { border-color: ${f.vermelho}; }
.mesa.destaque { outline: 4px solid ${f.navy}; outline-offset: 3px; z-index: 6; animation: pulsar 1.1s ease-in-out infinite; }
.mesa.apagada { opacity: .25; }
.mesa.selecionada { border-color: ${f.navy}; outline: 4px solid ${f.verde}; outline-offset: 2px; transform: scale(1.1); z-index: 6; }
@keyframes pulsar { 0%,100% { transform: scale(1); } 50% { transform: scale(1.14); } }
.badge-canto { position: absolute; top: -7px; right: -7px; font-size: 12px; background: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.check { color: ${f.verde}; font-weight: 900; }
.rel-vencido { background: ${f.vermelho}; }
.badge-avulso { position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); background: ${f.navy}; color: ${f.creme}; font-size: 9.5px; font-weight: 800; padding: 1px 6px; border-radius: 999px; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.badge-sel { position: absolute; top: -9px; left: -9px; background: ${f.verde}; color: #fff; font-size: 12px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.35); }
.arrastavel { cursor: grab; }
.arrastavel:active { cursor: grabbing; }

/* ---- legenda ---- */
.legenda { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 12px; padding: 10px; background: ${f.navy}; border-radius: 12px; color: ${f.creme}; font-size: 12.5px; }
.leg-item { display: flex; align-items: center; gap: 7px; }
.bolinha { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff; display: inline-block; }
.b-livre { background: #FFFDF6; }
.b-res { background: ${f.dourado}; }
.b-paga { background: ${f.verde}; }
.leg-info { font-weight: 700; }

/* ---- rodapé ---- */
.rodape { text-align: center; color: ${f.creme}; font-size: 13.5px; margin-top: 16px; padding: 0 14px; }
.assinatura { margin-top: 6px; font-weight: 800; letter-spacing: 1px; font-size: 12px; opacity: .85; }
.erro-storage { margin-top: 8px; background: rgba(0,0,0,.3); display: inline-block; padding: 6px 14px; border-radius: 10px; }
.sair-vitrine { position: fixed; bottom: 14px; right: 14px; z-index: 60; border: 2px solid ${f.creme}; background: rgba(0,0,0,.35); color: ${f.creme}; font-family: 'Archivo'; font-weight: 700; font-size: 12px; padding: 8px 14px; border-radius: 999px; cursor: pointer; opacity: .85; }

/* ---- overlay / painéis ---- */
.overlay { position: fixed; inset: 0; background: rgba(20, 16, 10, .55); z-index: 50; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
.painel { background: ${f.cremeClaro}; width: 100%; max-width: 560px; max-height: 88vh; border-radius: 22px 22px 0 0; padding: 18px; overflow: auto; border-top: 5px solid ${f.navy}; }
.painel-grande { max-width: 640px; }
@media (min-width: 640px) {
  .overlay { align-items: center; padding: 20px; }
  .painel { border-radius: 22px; border: 4px solid ${f.navy}; }
}
.painel-topo { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.painel-topo h2 { font-family: 'Alfa Slab One', serif; font-size: 18px; margin: 0; display: flex; align-items: center; gap: 10px; color: ${f.navy}; }
.num-mesa { width: 40px; height: 40px; border-radius: 50%; border: 3px solid; display: inline-flex; align-items: center; justify-content: center; font-size: 15px; font-family: 'Archivo'; font-weight: 800; flex-shrink: 0; }
.btn-fechar { border: 0; background: ${f.navy}; color: ${f.creme}; width: 34px; height: 34px; border-radius: 50%; font-size: 15px; cursor: pointer; flex-shrink: 0; }

.painel-resumo { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 13px; margin: 10px 0; padding: 10px 12px; background: ${f.creme}; border-radius: 10px; }
.painel-acoes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

/* ---- abas ---- */
.abas { display: flex; gap: 4px; margin-top: 10px; background: rgba(0,0,0,.07); padding: 4px; border-radius: 12px; }
.aba { flex: 1; border: 0; background: transparent; color: ${f.navyClaro}; font-family: 'Archivo'; font-weight: 800; font-size: 12.5px; padding: 9px 4px; border-radius: 9px; cursor: pointer; white-space: nowrap; }
.aba-ativa { background: ${f.navy}; color: ${f.creme}; box-shadow: 0 2px 5px rgba(0,0,0,.2); }

.setor-totais { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.setor-chip { font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 999px; border: 2px solid; }
.filtros { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.filtro { border: 2px solid #D8C9A4; background: #fff; color: ${f.navyClaro}; font-family: 'Archivo'; font-weight: 700; font-size: 12px; padding: 6px 11px; border-radius: 999px; cursor: pointer; }
.filtro-ativo { background: ${f.navy}; border-color: ${f.navy}; color: ${f.creme}; }
.busca-painel { width: 100%; font-family: 'Archivo'; font-size: 14px; padding: 10px 12px; border: 2px solid #D8C9A4; border-radius: 10px; background: #fff; color: ${f.navy}; margin-bottom: 10px; }

/* fechamento */
.bloco-fechamento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.fechamento-col { background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 10px 12px; }
.fechamento-col h4 { margin: 0 0 8px; font-size: 12.5px; color: ${f.navyClaro}; text-transform: uppercase; letter-spacing: .5px; }
.linha-fech { display: flex; justify-content: space-between; font-size: 13.5px; padding: 3px 0; }
.linha-fech.total { border-top: 2px solid ${f.creme}; margin-top: 5px; padding-top: 6px; font-size: 14px; }

/* resumo do caixa */
.resumo-caixa { background: ${f.navy}; color: ${f.creme}; border-radius: 14px; padding: 12px 16px; margin-bottom: 12px; }
.caixa-linha { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; padding: 4px 0; }
.caixa-linha b { font-weight: 800; }
.caixa-linha .pos { color: #9FD68A; }
.caixa-linha .neg { color: #F0A58C; }
.caixa-linha.sub { border-top: 1px dashed rgba(245,231,198,.35); margin-top: 3px; padding-top: 7px; }
.caixa-linha.resultado { border-top: 2px solid ${f.dourado}; margin-top: 6px; padding-top: 9px; font-size: 16px; }
.caixa-linha.resultado b { font-family: 'Alfa Slab One', serif; font-size: 19px; color: ${f.dourado}; }
.caixa-linha.resultado.negativo b { color: #F0A58C; }

/* listas de lançamentos */
.bloco-lancamentos { background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 10px 12px; margin-bottom: 10px; }
.lanc-cabecalho { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.lanc-cabecalho h4 { margin: 0; font-size: 13px; color: ${f.navyClaro}; }
.btn-lanc { border: 0; background: ${f.verde}; color: #fff; font-family: 'Archivo'; font-weight: 800; font-size: 12px; padding: 7px 12px; border-radius: 9px; cursor: pointer; }
.btn-lanc-desp { background: ${f.vermelho}; }
.linha-lanc { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; width: 100%; text-align: left; background: ${f.cremeClaro}; border: 1px solid #E5D9BC; border-radius: 9px; padding: 8px 10px; margin-top: 5px; font-family: 'Archivo'; font-size: 13px; color: ${f.navy}; cursor: pointer; }
.lanc-desc { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lanc-forma { font-size: 11px; color: #8a7a55; }
.lanc-valor { font-weight: 800; white-space: nowrap; }
.lanc-valor.pos { color: ${f.verde}; }
.lanc-valor.neg { color: ${f.vermelho}; }
.log-despesa { color: ${f.vermelho}; }

/* seletor de tipo no modal de lançamento */
.tipo-lanc { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tipo-lanc .tipo-opt { display: flex; flex-direction: column; gap: 2px; align-items: center; border: 2.5px solid #C9BA94; background: #fff; border-radius: 12px; padding: 12px 8px; font-family: 'Archivo'; font-weight: 800; font-size: 14px; color: #8a7a55; cursor: pointer; }
.tipo-lanc .tipo-opt small { font-weight: 600; font-size: 10.5px; }
.tipo-lanc .on-rec { background: ${f.verde}; border-color: #2c4a1a; color: #fff; box-shadow: 0 3px 0 #2c4a1a; }
.tipo-lanc .on-desp { background: ${f.vermelho}; border-color: #7a241a; color: #fff; box-shadow: 0 3px 0 #7a241a; }

/* log */
.bloco-log { background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 8px 12px; max-height: 240px; overflow: auto; }
.bloco-log-grande { max-height: 56vh; margin-top: 10px; }
.linha-log { display: flex; gap: 10px; font-size: 12.5px; padding: 4px 0; border-bottom: 1px dashed #EEE3C8; }
.linha-log:last-child { border-bottom: 0; }
.log-ts { color: #9a8a60; white-space: nowrap; font-weight: 600; }
.log-pagamento { color: ${f.verde}; font-weight: 600; }
.log-entrada { color: ${f.navy}; font-weight: 700; }
.chip-dentro { background: ${f.verde}; color: #fff; }
.log-liberacao { color: ${f.vermelho}; }

.lista-reservas { display: flex; flex-direction: column; gap: 7px; }
.linha-reserva { display: grid; grid-template-columns: auto auto 1fr auto; gap: 10px; align-items: center; background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 10px 12px; font-family: 'Archivo'; font-size: 13.5px; text-align: left; cursor: pointer; color: ${f.navy}; }
.linha-vencida { border-color: ${f.vermelho}; background: #FDF1EC; }
.tag-status { font-size: 10px; font-weight: 800; letter-spacing: .5px; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
.tag-paga { background: ${f.verde}; color: #fff; }
.tag-res { background: ${f.dourado}; color: #5C3A06; }
.tag-venc { background: ${f.vermelho}; color: #fff; }
.linha-mesa { font-weight: 800; white-space: nowrap; }
.linha-nome { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sub-prazo { color: #9a8a60; font-weight: 600; }
.linha-valor { font-weight: 700; white-space: nowrap; }
.vazio { text-align: center; color: #8a7a55; font-size: 14px; padding: 24px 10px; }

/* ---- biblioteca de elementos ---- */
.grade-presets { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 12px; }
.preset { font-family: 'Archivo'; font-weight: 800; font-size: 12.5px; padding: 16px 8px; border-radius: 12px; cursor: pointer; text-align: center; letter-spacing: .5px; }
.preset-navy { background: ${f.navy}; color: ${f.creme}; border: 3px solid ${f.dourado}; }
.preset-zona { background: #FFF8E6; color: ${f.navy}; border: 2.5px dashed ${f.navy}; }
.preset-texto { background: transparent; color: ${f.laranjaEscuro}; border: 2px solid ${f.laranjaEscuro}; }

/* ---- formulários ---- */
.form { display: flex; flex-direction: column; gap: 11px; margin-top: 12px; }
.form label { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; font-weight: 700; color: ${f.navyClaro}; }
.form input, .form select, .form textarea { font-family: 'Archivo'; font-size: 15px; padding: 10px 12px; border: 2px solid #D8C9A4; border-radius: 10px; background: #fff; color: ${f.navy}; }
.form input:focus, .form select:focus, .form textarea:focus { outline: 2px solid ${f.navy}; }
.duas-colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.nota { font-size: 12.5px; color: #7d6c45; margin: 0; }
.nota-centro { text-align: center; }
.erro { color: ${f.vermelho}; font-size: 13px; font-weight: 700; margin: 0; }
.saldo { margin: -4px 0 0; font-size: 13px; font-weight: 800; color: ${f.vermelho}; }
.saldo-ok { color: ${f.verde}; }
.saldo-info { color: ${f.navyClaro}; }
.caixa-avulsos-mesa { background: #EDF0F7; border: 2px solid ${f.navyClaro}; border-radius: 10px; padding: 9px 12px; font-size: 13px; }
.caixa-avulsos-mesa .lista-nomes { display: block; margin-top: 3px; color: ${f.navyClaro}; }
.caixa-lote { background: #E8F1DF; border: 2px solid ${f.verde}; border-radius: 10px; padding: 9px 12px; font-size: 13.5px; }

/* ---- seletor de status (reconstruído) ---- */
.rotulo-status { font-size: 12.5px; font-weight: 700; color: ${f.navyClaro}; margin-bottom: 5px; }
.status-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.status-toggle .opt {
  position: relative; border: 3px solid #C9BA94; background: #fff; border-radius: 14px;
  padding: 14px 8px 12px; min-height: 92px;
  font-family: 'Archivo'; color: #8a7a55; cursor: pointer;
  display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: center;
  transition: transform .1s ease;
}
.status-toggle .opt:active { transform: scale(.97); }
.status-toggle .opt .opt-icone { font-size: 20px; }
.status-toggle .opt .opt-titulo { font-weight: 800; font-size: 15.5px; }
.status-toggle .opt small { font-weight: 600; font-size: 11px; }
.status-toggle .opt .opt-check { display: none; }
.status-toggle .opt-res-on {
  background: ${f.dourado}; border-color: #8a5a10; color: #4a2f04;
  box-shadow: 0 3px 0 #8a5a10;
}
.status-toggle .opt-paga-on {
  background: ${f.verde}; border-color: #2c4a1a; color: #fff;
  box-shadow: 0 3px 0 #2c4a1a;
}
.status-toggle .opt-res-on .opt-check, .status-toggle .opt-paga-on .opt-check {
  display: block; font-size: 9.5px; font-weight: 900; letter-spacing: .8px; margin-top: 4px;
  background: rgba(255,255,255,.85); color: ${f.navy}; padding: 2px 8px; border-radius: 999px;
}

.confirma-botoes { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; flex-wrap: wrap; }
.caixa-confirma { background: ${f.cremeClaro}; border: 4px solid ${f.navy}; border-radius: 18px; padding: 20px; max-width: 420px; margin: auto; font-size: 14.5px; }
.caixa-confirma .confirma-botoes { margin-top: 14px; }
