@import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo:ital,wght@0,400;0,600;0,800;1,400&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; }

.raiz {
  min-height: 100vh;
  background-color: ${y.laranja};
  background-image:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.07), transparent 38%),
    radial-gradient(circle at 85% 80%, rgba(0,0,0,.12), transparent 45%),
    repeating-linear-gradient(45deg, rgba(0,0,0,.025) 0 2px, transparent 2px 6px);
  font-family: 'Archivo', sans-serif;
  color: ${y.navy};
  padding-bottom: 28px;
}

/* ---- cabeçalho ---- */
.cabecalho { text-align: center; padding: 10px 12px 6px; position: relative; }
.bandeirinhas { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
.bandeira { width: 16px; height: 20px; clip-path: polygon(0 0, 100% 0, 50% 100%); opacity: .92; }
.titulo {
  font-family: 'Alfa Slab One', serif;
  color: ${y.creme};
  font-size: clamp(28px, 7vw, 52px);
  margin: 0; letter-spacing: 1px;
  text-shadow: 0 3px 0 ${y.laranjaEscuro}, 0 6px 14px rgba(0,0,0,.28);
}
.faixa-evento {
  display: inline-block; background: ${y.creme}; color: ${y.navy};
  font-family: 'Alfa Slab One', serif; font-size: clamp(16px, 4vw, 24px);
  padding: 4px 22px; border: 3px solid ${y.navy}; border-radius: 6px;
  transform: rotate(-.6deg); margin-top: 6px; box-shadow: 0 4px 0 rgba(0,0,0,.18);
}
.faixa-data {
  display: inline-block; background: ${y.navy}; color: ${y.creme};
  font-weight: 800; letter-spacing: .5px; padding: 3px 18px; border-radius: 999px;
  margin-top: 8px; font-size: 14px;
}
.contador-vitrine {
  display: block; margin: 14px auto 0; font-family: 'Alfa Slab One', serif;
  color: ${y.creme}; font-size: clamp(20px, 5vw, 32px); letter-spacing: 1px;
  text-shadow: 0 3px 0 ${y.laranjaEscuro};
}
.contador-vitrine b { color: #fff; }

/* ---- toolbar ---- */
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; margin: 14px auto 0; padding: 8px 12px; max-width: 1340px; }
.modos { display: flex; background: rgba(0,0,0,.18); border-radius: 999px; padding: 3px; }
.btn-modo { border: 0; background: transparent; color: ${y.creme}; font-family: 'Archivo'; font-weight: 800; font-size: 14px; padding: 8px 16px; border-radius: 999px; cursor: pointer; }
.btn-modo.ativo { background: ${y.creme}; color: ${y.navy}; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
.contadores { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.chip { background: ${y.cremeClaro}; border-radius: 999px; padding: 5px 12px; font-size: 13px; border: 2px solid transparent; }
.chip-livre { border-color: #c9b98f; }
.chip-res { border-color: ${y.dourado}; }
.chip-paga { border-color: ${y.verde}; }
.chip-receita { background: ${y.navy}; color: ${y.creme}; font-weight: 800; }
.chip-pendente { background: ${y.vermelho}; color: #fff; font-weight: 800; }
.acoes-toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
.btn-mini { width: 32px; height: 32px; border-radius: 8px; border: 2px solid ${y.creme}; background: transparent; color: ${y.creme}; font-size: 18px; font-weight: 800; cursor: pointer; }
.zoom-label { color: ${y.creme}; font-size: 12px; font-weight: 600; min-width: 38px; text-align: center; }
.btn-sec { border: 2px solid ${y.creme}; background: transparent; color: ${y.creme}; font-family: 'Archivo'; font-weight: 700; font-size: 13px; padding: 7px 12px; border-radius: 10px; cursor: pointer; position: relative; }
.btn-sec-navy { border-color: ${y.navy}; color: ${y.navy}; }
.btn-prim { border: 0; background: ${y.navy}; color: ${y.creme}; font-family: 'Archivo'; font-weight: 800; font-size: 14px; padding: 10px 18px; border-radius: 10px; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.25); }
.btn-perigo { border: 2px solid ${y.vermelho}; background: transparent; color: ${y.vermelho}; font-family: 'Archivo'; font-weight: 700; font-size: 13px; padding: 9px 14px; border-radius: 10px; cursor: pointer; }
.badge-alerta { position: absolute; top: -8px; right: -8px; background: ${y.vermelho}; color: #fff; font-size: 11px; font-weight: 800; min-width: 19px; height: 19px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }

/* ---- busca ---- */
.barra-busca { max-width: 1340px; margin: 8px auto 0; padding: 0 12px; display: flex; gap: 8px; align-items: center; }
.barra-busca input {
  flex: 1; font-family: 'Archivo'; font-size: 15px; padding: 11px 14px;
  border: 3px solid ${y.navy}; border-radius: 12px; background: ${y.cremeClaro}; color: ${y.navy};
}
.barra-busca input:focus { outline: 3px solid ${y.creme}; }
.busca-resultado { color: ${y.creme}; font-weight: 800; font-size: 13px; white-space: nowrap; }
.btn-limpar { flex-shrink: 0; }

/* ---- alertas ---- */
.alerta-vencidas {
  max-width: 1340px; margin: 8px auto 0; padding: 10px 14px; cursor: pointer;
  background: ${y.vermelho}; color: #fff; border-radius: 12px; font-size: 13.5px;
  border: 2px dashed #fff;
}
.aviso-edicao {
  max-width: 1340px; margin: 8px auto 0; padding: 10px 14px;
  background: ${y.navy}; color: ${y.creme}; border-radius: 12px; font-size: 13.5px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.botoes-edicao { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-add { border: 2px solid ${y.creme}; background: ${y.cremeClaro}; color: ${y.navy}; font-family: 'Archivo'; font-weight: 700; font-size: 12.5px; padding: 5px 10px; border-radius: 8px; cursor: pointer; }

/* ---- mapa ---- */
.moldura {
  max-width: 1340px; margin: 14px auto 0; background: ${y.cremeClaro};
  border: 4px solid ${y.navy}; border-radius: 22px; padding: 14px;
  box-shadow: inset 0 0 0 3px ${y.creme}, 0 10px 30px rgba(0,0,0,.25);
  position: relative;
}
.rotulo-area {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  background: ${y.navy}; color: ${y.creme}; font-family: 'Alfa Slab One', serif;
  font-size: 14px; letter-spacing: 1.5px; padding: 5px 22px; border-radius: 8px; white-space: nowrap;
}
.scroll-mapa { overflow: auto; border-radius: 12px; }
.canvas { position: relative; touch-action: none; }

.zona { position: absolute; border: 2.5px dashed; border-radius: 14px; display: flex; justify-content: center; padding-top: 8px; }
.zona-titulo { font-family: 'Alfa Slab One', serif; font-size: 16px; letter-spacing: 1.5px; }

.area { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border-radius: 12px; }
.area-navy { background: ${y.navy}; color: ${y.creme}; border: 3px solid ${y.dourado}; font-family: 'Alfa Slab One', serif; letter-spacing: 2px; text-align: center; box-shadow: 0 5px 0 rgba(0,0,0,.25); }
.area-navy .area-label { font-size: clamp(13px, 1.4vw, 20px); padding: 0 6px; }
.area-texto { color: ${y.laranjaEscuro}; font-weight: 800; letter-spacing: 4px; font-size: 14px; }
.estrela { color: ${y.dourado}; font-size: 14px; }

.mesa {
  position: absolute; width: 46px; height: 46px; border-radius: 50%;
  border: 3px solid; background: #fff;
  font-family: 'Archivo'; font-weight: 800; font-size: 14.5px; color: ${y.navy};
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 0 rgba(0,0,0,.18);
  transition: transform .12s ease, opacity .15s ease;
}
.mesa:hover { transform: scale(1.12); z-index: 5; }
.mesa:focus-visible { outline: 3px solid ${y.navy}; outline-offset: 2px; }
.mesa-livre { background: #FFFDF6; }
.mesa-reservada { background: ${y.dourado}; border-color: #B97A1E; color: #5C3A06; }
.mesa-paga { background: ${y.verde}; border-color: #35591F; color: #fff; }
.mesa-estatica { cursor: default; }
.mesa.vencida { border-color: ${y.vermelho}; }
.mesa.destaque { outline: 4px solid ${y.navy}; outline-offset: 3px; z-index: 6; animation: pulsar 1.1s ease-in-out infinite; }
.mesa.apagada { opacity: .25; }
@keyframes pulsar { 0%,100% { transform: scale(1); } 50% { transform: scale(1.14); } }
.check, .relogio { position: absolute; top: -7px; right: -7px; font-size: 12px; background: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.check { color: ${y.verde}; font-weight: 900; }
.rel-vencido { background: ${y.vermelho}; }
.arrastavel { cursor: grab; }
.arrastavel:active { cursor: grabbing; }

/* ---- legenda ---- */
.legenda { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 12px; padding: 10px; background: ${y.navy}; border-radius: 12px; color: ${y.creme}; font-size: 13px; }
.leg-item { display: flex; align-items: center; gap: 7px; }
.bolinha { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff; display: inline-block; }
.b-livre { background: #FFFDF6; }
.b-res { background: ${y.dourado}; }
.b-paga { background: ${y.verde}; }
.leg-info { font-weight: 700; }

/* ---- rodapé ---- */
.rodape { text-align: center; color: ${y.creme}; font-size: 13.5px; margin-top: 16px; padding: 0 14px; }
.assinatura { margin-top: 6px; font-weight: 800; letter-spacing: 1px; font-size: 12px; opacity: .85; }
.erro-storage { margin-top: 8px; background: rgba(0,0,0,.3); display: inline-block; padding: 6px 14px; border-radius: 10px; }

/* ---- vitrine ---- */
.sair-vitrine {
  position: fixed; bottom: 14px; right: 14px; z-index: 60;
  border: 2px solid ${y.creme}; background: rgba(0,0,0,.35); color: ${y.creme};
  font-family: 'Archivo'; font-weight: 700; font-size: 12px; padding: 8px 14px; border-radius: 999px; cursor: pointer;
  opacity: .8;
}

/* ---- overlay / painéis ---- */
.overlay { position: fixed; inset: 0; background: rgba(20, 16, 10, .55); z-index: 50; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
.painel { background: ${y.cremeClaro}; width: 100%; max-width: 560px; max-height: 88vh; border-radius: 22px 22px 0 0; padding: 18px; overflow: auto; border-top: 5px solid ${y.navy}; }
@media (min-width: 640px) {
  .overlay { align-items: center; padding: 20px; }
  .painel { border-radius: 22px; border: 4px solid ${y.navy}; }
}
.painel-topo { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.painel-topo h2 { font-family: 'Alfa Slab One', serif; font-size: 19px; margin: 0; display: flex; align-items: center; gap: 10px; color: ${y.navy}; }
.num-mesa { width: 40px; height: 40px; border-radius: 50%; border: 3px solid; display: inline-flex; align-items: center; justify-content: center; font-size: 15px; font-family: 'Archivo'; font-weight: 800; }
.btn-fechar { border: 0; background: ${y.navy}; color: ${y.creme}; width: 34px; height: 34px; border-radius: 50%; font-size: 15px; cursor: pointer; flex-shrink: 0; }

.painel-resumo { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 13.5px; margin: 10px 0; padding: 10px 12px; background: ${y.creme}; border-radius: 10px; }
.painel-acoes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.painel-acoes .btn-sec { border-color: ${y.navy}; color: ${y.navy}; }
.btn-arquivo { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }

/* fechamento */
.bloco-fechamento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.fechamento-col { background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 10px 12px; }
.fechamento-col h4 { margin: 0 0 8px; font-size: 13px; color: ${y.navyClaro}; text-transform: uppercase; letter-spacing: .5px; }
.linha-fech { display: flex; justify-content: space-between; font-size: 13.5px; padding: 3px 0; }
.linha-fech.total { border-top: 2px solid ${y.creme}; margin-top: 5px; padding-top: 6px; font-size: 14px; }

/* log */
.bloco-log { background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 8px 12px; margin-bottom: 12px; max-height: 220px; overflow: auto; }
.linha-log { display: flex; gap: 10px; font-size: 12.5px; padding: 4px 0; border-bottom: 1px dashed #EEE3C8; }
.linha-log:last-child { border-bottom: 0; }
.log-ts { color: #9a8a60; white-space: nowrap; font-weight: 600; }
.log-pagamento { color: ${y.verde}; font-weight: 600; }
.log-liberacao { color: ${y.vermelho}; }

.lista-reservas { display: flex; flex-direction: column; gap: 7px; }
.linha-reserva {
  display: grid; grid-template-columns: auto auto 1fr auto; gap: 10px; align-items: center;
  background: #fff; border: 2px solid #E5D9BC; border-radius: 12px; padding: 10px 12px;
  font-family: 'Archivo'; font-size: 13.5px; text-align: left; cursor: pointer; color: ${y.navy};
}
.linha-vencida { border-color: ${y.vermelho}; background: #FDF1EC; }
.tag-status { font-size: 10px; font-weight: 800; letter-spacing: .5px; padding: 3px 8px; border-radius: 999px; }
.tag-paga { background: ${y.verde}; color: #fff; }
.tag-res { background: ${y.dourado}; color: #5C3A06; }
.tag-venc { background: ${y.vermelho}; color: #fff; }
.linha-mesa { font-weight: 800; white-space: nowrap; }
.linha-nome { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sub-prazo { color: #9a8a60; font-weight: 600; }
.linha-valor { font-weight: 700; white-space: nowrap; }
.vazio { text-align: center; color: #8a7a55; font-size: 14px; padding: 24px 10px; }

/* ---- formulários ---- */
.form { display: flex; flex-direction: column; gap: 11px; margin-top: 12px; }
.form label { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; font-weight: 700; color: ${y.navyClaro}; }
.form input, .form select, .form textarea { font-family: 'Archivo'; font-size: 15px; padding: 10px 12px; border: 2px solid #D8C9A4; border-radius: 10px; background: #fff; color: ${y.navy}; }
.form input:focus, .form select:focus, .form textarea:focus { outline: 2px solid ${y.navy}; }
.duas-colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.nota { font-size: 12.5px; color: #7d6c45; margin: 0; }
.nota-centro { text-align: center; }
.erro { color: ${y.vermelho}; font-size: 13px; font-weight: 700; margin: 0; }
.saldo { margin: -4px 0 0; font-size: 13px; font-weight: 800; color: ${y.vermelho}; }
.saldo-ok { color: ${y.verde}; }
.rotulo-status { font-size: 12.5px; font-weight: 700; color: ${y.navyClaro}; }
.status-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.status-toggle .opt { border: 2.5px solid #D8C9A4; background: #fff; border-radius: 12px; padding: 10px; font-family: 'Archivo'; font-weight: 800; font-size: 14px; color: ${y.navy}; cursor: pointer; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.status-toggle .opt small { font-weight: 600; font-size: 11px; color: #8a7a55; }
.opt-res { border-color: #B97A1E; background: #FBEFD2; }
.opt-paga { border-color: ${y.verde}; background: #E8F1DF; }
.confirma-botoes { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; flex-wrap: wrap; }

.caixa-confirma { background: ${y.cremeClaro}; border: 4px solid ${y.navy}; border-radius: 18px; padding: 20px; max-width: 420px; margin: auto; font-size: 14.5px; }
.caixa-confirma .confirma-botoes { margin-top: 14px; }

/* ---- toast ---- */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: ${y.navy}; color: ${y.creme}; padding: 11px 20px; border-radius: 999px; font-weight: 700; font-size: 14px; z-index: 99; box-shadow: 0 6px 18px rgba(0,0,0,.35); border: 2px solid ${y.dourado}; }

@media (prefers-reduced-motion: reduce) { .mesa, .mesa.destaque { transition: none; animation: none; } }
@media (max-width: 640px) {
  .duas-colunas, .bloco-fechamento { grid-template-columns: 1fr; }
  .toolbar { padding: 6px; }
}
