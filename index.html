@import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo:ital,wght@0,400;0,600;0,800;1,400&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; }
button { touch-action: manipulation; }

.raiz {
  min-height: 100vh;
  background-color: ${h.laranja};
  background-image:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.07), transparent 38%),
    radial-gradient(circle at 85% 80%, rgba(0,0,0,.12), transparent 45%),
    repeating-linear-gradient(45deg, rgba(0,0,0,.025) 0 2px, transparent 2px 6px);
  font-family: 'Archivo', sans-serif;
  color: ${h.navy};
  padding-bottom: 28px;
}

/* ---- cabeçalho ---- */
.cabecalho { text-align: center; padding: 10px 12px 6px; }
.cabecalho-compacto { padding-bottom: 2px; }
.bandeirinhas { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
.bandeira { width: 16px; height: 20px; clip-path: polygon(0 0, 100% 0, 50% 100%); opacity: .92; }
.titulo {
  font-family: 'Alfa Slab One', serif; color: ${h.creme};
  font-size: clamp(28px, 7vw, 52px); margin: 0; letter-spacing: 1px;
  text-shadow: 0 3px 0 ${h.laranjaEscuro}, 0 6px 14px rgba(0,0,0,.28);
}
.titulo-compacto { font-size: clamp(22px, 5.5vw, 38px); }
.faixa-evento {
  display: inline-block; background: ${h.creme}; color: ${h.navy};
  font-family: 'Alfa Slab One', serif; font-size: clamp(16px, 4vw, 24px);
  padding: 4px 22px; border: 3px solid ${h.navy}; border-radius: 6px;
  transform: rotate(-.6deg); margin-top: 6px; box-shadow: 0 4px 0 rgba(0,0,0,.18);
}
.faixa-compacta { font-size: clamp(12px, 3vw, 17px); padding: 3px 16px; }
.faixa-data { display: inline-block; background: ${h.navy}; color: ${h.creme}; font-weight: 800; letter-spacing: .5px; padding: 3px 18px; border-radius: 999px; margin-top: 8px; font-size: 14px; }
.contador-vitrine { display: block; margin: 14px auto 0; font-family: 'Alfa Slab One', serif; color: ${h.creme}; font-size: clamp(20px, 5vw, 32px); letter-spacing: 1px; text-shadow: 0 3px 0 ${h.laranjaEscuro}; }
.contador-vitrine b { color: #fff; }

/* ---- barra principal ---- */
.barra-principal {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
  margin: 12px auto 0; padding: 0 12px; max-width: 1400px;
}
.btn-menu {
  border: 3px solid ${h.creme}; background: ${h.navy}; color: ${h.creme};
  font-family: 'Archivo'; font-weight: 800; font-size: 17px; padding: 9px 16px; border-radius: 12px; cursor: pointer;
  box-shadow: 0 3px 0 rgba(0,0,0,.25);
}
.btn-menu-txt { font-size: 14px; }
.contadores { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; flex: 1; }
.chip { background: ${h.cremeClaro}; border-radius: 999px; padding: 5px 11px; font-size: 12.5px; font-weight: 700; border: 2px solid transparent; }
.chip-livre { border-color: #c9b98f; }
.chip-res { border-color: ${h.dourado}; }
.chip-paga { border-color: ${h.verde}; }
.chip-avulso { border-color: ${h.navyClaro}; }
.chip-receita { background: ${h.navy}; color: ${h.creme}; }
.zoom-grupo { display: flex; gap: 5px; align-items: center; }
.btn-mini { width: 32px; height: 32px; border-radius: 8px; border: 2px solid ${h.creme}; background: transparent; color: ${h.creme}; font-size: 18px; font-weight: 800; cursor: pointer; }
.zoom-label { color: ${h.creme}; font-size: 12px; font-weight: 600; min-width: 38px; text-align: center; }

.btn-sec { border: 2px solid ${h.creme}; background: transparent; color: ${h.creme}; font-family: 'Archivo'; font-weight: 700; font-size: 13px; padding: 7px 12px; border-radius: 10px; cursor: pointer; }
.btn-sec-navy { border-color: ${h.navy}; color: ${h.navy}; }
.btn-prim { border: 0; background: ${h.navy}; color: ${h.creme}; font-family: 'Archivo'; font-weight: 800; font-size: 14px; padding: 10px 18px; border-radius: 10px; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.25); }
.btn-prim:disabled { opacity: .5; cursor: not-allowed; }
.btn-perigo { border: 2px solid ${h.vermelho}; background: transparent; color: ${h.vermelho}; font-family: 'Archivo'; font-weight: 700; font-size: 13px; padding: 9px 14px; border-radius: 10px; cursor: pointer; }

/* ---- menu suspenso (drawer) ---- */
.overlay-menu { align-items: stretch !important; justify-content: flex-start !important; padding: 0 !important; }
.drawer {
  background: ${h.cremeClaro}; width: min(320px, 86vw); height: 100vh; overflow: auto;
  border-right: 5px solid ${h.navy}; padding: 16px 14px; display: flex; flex-direction: column;
  animation: deslizar .18s ease-out;
}
@keyframes deslizar { from { transform: translateX(-30px); opacity: 0; } to { transform: none; opacity: 1; } }
.drawer-topo { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.drawer-titulo { font-family: 'Alfa Slab One', serif; font-size: 15px; color: ${h.navy}; }
.drawer-secao { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: #9a8a60; margin: 14px 4px 4px; }
.drawer-item {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  border: 2px solid transparent; background: #fff; color: ${h.navy};
  font-family: 'Archivo'; font-weight: 700; font-size: 14.5px;
  padding: 12px 13px; border-radius: 12px; cursor: pointer; margin-top: 6px;
  box-shadow: 0 1px 0 rgba(0,0,0,.08);
}
.drawer-item.ativo { border-color: ${h.navy}; background: ${h.creme}; }
.badge-alerta-inline { margin-left: auto; background: ${h.vermelho}; color: #fff; font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; }
.drawer-rodape { margin-top: auto; padding-top: 18px; text-align: center; font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #9a8a60; }

/* ---- busca ---- */
.barra-busca { max-width: 1400px; margin: 8px auto 0; padding: 0 12px; display: flex; gap: 8px; align-items: center; }
.barra-busca input { flex: 1; font-family: 'Archivo'; font-size: 15px; padding: 11px 14px; border: 3px solid ${h.navy}; border-radius: 12px; background: ${h.cremeClaro}; color: ${h.navy}; }
.barra-busca input:focus { outline: 3px solid ${h.creme}; }
.busca-resultado { color: ${h.creme}; font-weight: 800; font-size: 13px; white-space: nowrap; }
.btn-limpar { flex-shrink: 0; }

/* ---- faixas de aviso ---- */
.alerta-vencidas { max-width: 1400px; margin: 8px auto 0; padding: 10px 14px; cursor: pointer; background: ${h.vermelho}; color: #fff; border-radius: 12px; font-size: 13.5px; border: 2px dashed #fff; }
.aviso-edicao, .aviso-selecao {
  max-width: 1400px; margin: 8px auto 0; padding: 10px 14px;
  color: ${h.creme}; border-radius: 12px; font-size: 13.5px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;
}
.aviso-edicao { background: ${h.navy}; }
.aviso-selecao { background: ${h.verde}; border: 2px dashed #fff; }
.botoes-edicao { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-add { border: 2px solid ${h.creme}; background: ${h.cremeClaro}; color: ${h.navy}; font-family: 'Archivo'; font-weight: 700; font-size: 12.5px; padding: 6px 11px; border-radius: 8px; cursor: pointer; }
.btn-add:disabled { opacity: .55; cursor: not-allowed; }
.btn-add-destaque { background: ${h.dourado}; border-color: #fff; }
.btn-add-sair { background: ${h.navy}; color: ${h.creme}; }

/* ---- mapa ---- */
.moldura { max-width: 1400px; margin: 14px auto 0; background: ${h.cremeClaro}; border: 4px solid ${h.navy}; border-radius: 22px; padding: 14px; box-shadow: inset 0 0 0 3px ${h.creme}, 0 10px 30px rgba(0,0,0,.25); position: relative; }
.rotulo-area { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: ${h.navy}; color: ${h.creme}; font-family: 'Alfa Slab One', serif; font-size: 14px; letter-spacing: 1.5px; padding: 5px 22px; border-radius: 8px; white-space: nowrap; }
.scroll-mapa { overflow: auto; border-radius: 12px; }
.canvas { position: relative; touch-action: none; }

.zona { position: absolute; border: 2.5px dashed; border-radius: 14px; display: flex; justify-content: center; padding-top: 8px; }
.zona-titulo { font-family: 'Alfa Slab One', serif; font-size: 16px; letter-spacing: 1.5px; }

.area { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border-radius: 12px; }
.area-navy { background: ${h.navy}; color: ${h.creme}; border: 3px solid ${h.dourado}; font-family: 'Alfa Slab One', serif; letter-spacing: 2px; text-align: center; box-shadow: 0 5px 0 rgba(0,0,0,.25); }
.area-navy .area-label { font-size: clamp(12px, 1.3vw, 18px); padding: 0 6px; }
.area-zona { background: #FFF8E6; border: 2.5px dashed ${h.navy}; color: ${h.navy}; font-family: 'Alfa Slab One', serif; text-align: center; }
.area-zona .area-label { font-size: clamp(12px, 1.2vw, 16px); padding: 0 8px; letter-spacing: 1px; }
.area-texto { color: ${h.laranjaEscuro}; font-weight: 800; letter-spacing: 4px; font-size: 14px; }
.estrela { color: ${h.dourado}; font-size: 13px; }
.area-zona .estrela, .area-texto .estrela { display: none; }

.mesa {
  position: absolute; width: 46px; height: 46px; border-radius: 50%;
  border: 3px solid; background: #fff;
  font-family: 'Archivo'; font-weight: 800; font-size: 14.5px; color: ${h.navy};
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 0 rgba(0,0,0,.18);
  transition: transform .12s ease, opacity .15s ease;
}
.mesa:hover { transform: scale(1.12); z-index: 5; }
.mesa:focus-visible { outline: 3px solid ${h.navy}; outline-offset: 2px; }
.mesa-livre { background: #FFFDF6; }
.mesa-reservada { background: ${h.dourado}; border-color: #B97A1E; color: #5C3A06; }
.mesa-paga { background: ${h.verde}; border-color: #35591F; color: #fff; }
.mesa-estatica { cursor: default; }
.mesa.vencida { border-color: ${h.vermelho}; }
.mesa.destaque { outline: 4px solid ${h.navy}; outline-offset: 3px; z-index: 6; animation: pulsar 1.1s ease-in-out infinite; }
.mesa.apagada { opacity: .25; }
.mesa.selecionada { border-color: ${h.navy}; outline: 4px solid ${h.verde}; outline-offset: 2px; transform: scale(1.1); z-index: 6; }
@keyframes pulsar { 0%,100% { transform: scale(1); } 50% { transform: scale(1.14); } }
.badge-canto { position: absolute; top: -7px; right: -7px; font-size: 12px; background: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.check { color: ${h.verde}; font-weight: 900; }
.rel-vencido { background: ${h.vermelho}; }
.badge-avulso { position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); background: ${h.navy}; color: ${h.creme}; font-size: 9.5px; font-weight: 800; padding: 1px 6px; border-radius: 999px; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.3); }

/* ---- legenda ---- */
.legenda { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 12px; padding: 10px; background: ${h.navy}; border-radius: 12px; color: ${h.creme}; font-size: 12.5px; }

/* ---- overlay / painéis ---- */
.overlay { position: fixed; inset: 0; background: rgba(20, 16, 10, .55); z-index: 50; display: flex; align-items: flex-end; justify-content: center; padding: 0; }

}
.painel-topo { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

.btn-fechar { border: 0; background: ${h.navy}; color: ${h.creme}; width: 34px; height: 34px; border-radius: 50%; font-size: 15px; cursor: pointer; flex-shrink: 0; }

.painel-resumo { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 13px; margin: 10px 0; padding: 10px 12px; background: ${h.creme}; border-radius: 10px; }

/* ---- abas ---- */

.setor-totais { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

/* fechamento */
.bloco-fechamento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

/* log */

/* ---- seletor de status (reconstruído) ---- */
